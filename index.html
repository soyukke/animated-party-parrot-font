<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kinetic Seven — animated variable font</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <p class="eyebrow">A VARIABLE FONT WITH A PULSE · <a href="party.html">PARTY PARROT →</a></p>
    <h1 id="specimen" contenteditable="true" spellcheck="false">ANIMATED<br>TYPE</h1>
    <section class="panel">
      <button id="toggle" type="button">Pause</button>
      <label>ANIM <input id="axis" type="range" min="0" max="100" value="0" step="0.1"></label>
      <label>SPEED <input id="speed" type="range" min="0.1" max="2" value="0.65" step="0.05"></label>
      <output id="value">0.0</output>
    </section>
    <p class="note">Click the headline to type. The glyph outlines are interpolated by the font's custom <code>ANIM</code> axis.</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
